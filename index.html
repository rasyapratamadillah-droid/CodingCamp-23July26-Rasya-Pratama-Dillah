<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Pengeluaran dan Visualisasi Anggaran</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Pengeluaran dan Visualisasi</h1>
            <button id="theme-toggle">View Mode</button>
        </header>

        <section class="balance-card">
            <h2>Total</h2>
            <h1 id="balance">$0.00</h1>
        </section>

        <div class="main-content">
            <!-- Input Form -->
            <section class="form-section">
                <h3>Masukan Transsaksi</h3>
                <form id="transaction-form">
                    <div class="form-control">
                        <label for="text">Nama Item</label>
                        <input type="text" id="text" placeholder="e.g. Cilok" required>
                    </div>
                    <div class="form-control">
                        <label for="amount">Jumlah</label>
                        <input type="number" id="amount" placeholder="e.g. 14.94" step="0.01" required>
                    </div>
                    <div class="form-control">
                        <label for="category">Kategori</label>
                        <select id="category" required>
                            <option value="" disabled selected>Pilih Kategori</option>
                            <option value="Food">Makanan</option>
                            <option value="Transport">Transportasi</option>
                            <option value="Fun">Hiburan</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Input</button>
                </form>
            </section>

            <div class="data-section">
                <!-- Transaction List -->
                <section class="list-section">
                    <div class="list-header">
                        <h3>Transactions</h3>
                        <select id="sort-options">
                            <option value="default">Sort by Date</option>
                            <option value="amount-desc">Highest Amount</option>
                            <option value="amount-asc">Lowest Amount</option>
                            <option value="category">Category</option>
                        </select>
                    </div>
                    <ul id="list" class="list">
                        <!-- Transactions will be injected here via JS -->
                    </ul>
                </section>

                <!-- Visual Chart -->
                <section class="chart-section">
                    <h3>Margin Pengeluaran</h3>
                    <canvas id="expenseChart"></canvas>
                </section>
            </div>
        </div>
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
